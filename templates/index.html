<!DOCTYPE html>
<html>
<head>
    <title>Secure File Storage System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>☁ Secure File Storage System</h1>
    <p class="subtitle">AWS S3 + IAM + Flask</p>

    <form method="POST" enctype="multipart/form-data" class="upload-form">
        <input type="file" name="file" required>
        <button type="submit">Upload File</button>
    </form>

<h2>Your Files ({{ file_count }})</h2>
    {% if files %}
        {% for file in files %}
        <div class="file-card">
            <span class="filename">📄 {{ file }}</span>

            <div class="actions">
                <a class="download" href="/download/{{ file }}">⬇ Download</a>
                <a class="delete" href="/delete/{{ file }}">🗑 Delete</a>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <p>No files uploaded.</p>
    {% endif %}

</div>

</body>
</html>
